<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 连接测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: bold;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
        }
        .section {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 API 连接诊断工具</h1>
        
        <div class="section">
            <h3>📡 步骤 1: 检查后端服务</h3>
            <div id="backendStatus" class="status info">
                正在检查后端服务...
            </div>
            <button onclick="checkBackend()">重新检查</button>
        </div>

        <div class="section">
            <h3>🔐 步骤 2: 登录获取 Token</h3>
            <label>用户名:</label>
            <input type="text" id="username" value="testuser" placeholder="输入用户名">
            
            <label>密码:</label>
            <input type="password" id="password" value="123456" placeholder="输入密码">
            
            <div class="btn-group">
                <button onclick="login()">登录</button>
                <button onclick="register()" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">注册新用户</button>
            </div>
            
            <div id="loginStatus"></div>
        </div>

        <div class="section">
            <h3>📦 步骤 3: 测试 API 接口</h3>
            <div class="btn-group">
                <button onclick="testProducts()" id="btnProducts" disabled>测试商品接口</button>
                <button onclick="testOrders()" id="btnOrders" disabled>测试订单接口</button>
                <button onclick="createTestProduct()" id="btnCreateProduct" disabled>创建测试商品</button>
                <button onclick="createTestOrder()" id="btnCreateOrder" disabled>创建测试订单</button>
            </div>
        </div>

        <div class="section">
            <h3>📊 测试结果</h3>
            <div id="result" class="result">等待测试...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        let currentToken = '';

        // 页面加载时自动检查后端
        window.onload = function() {
            checkBackend();
            const savedToken = sessionStorage.getItem('auth.token');
            if (savedToken) {
                currentToken = savedToken;
                enableButtons();
                showLoginStatus('已登录（使用缓存的 Token）', true);
            }
        };

        function showResult(data, isError = false) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.borderLeft = isError ? '4px solid #dc3545' : '4px solid #28a745';
            resultDiv.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        }

        function showLoginStatus(message, isSuccess) {
            const statusDiv = document.getElementById('loginStatus');
            statusDiv.className = 'status ' + (isSuccess ? 'success' : 'error');
            statusDiv.textContent = message;
        }

        function updateBackendStatus(isOnline, message) {
            const statusDiv = document.getElementById('backendStatus');
            statusDiv.className = 'status ' + (isOnline ? 'success' : 'error');
            statusDiv.textContent = message;
        }

        function enableButtons() {
            document.getElementById('btnProducts').disabled = false;
            document.getElementById('btnOrders').disabled = false;
            document.getElementById('btnCreateProduct').disabled = !currentToken;
            document.getElementById('btnCreateOrder').disabled = !currentToken;
        }

        async function checkBackend() {
            updateBackendStatus(false, '正在检查后端服务...');
            
            try {
                const response = await fetch(`${API_BASE}/api/ecommerce/products?page=1&per_page=1`, {
                    method: 'GET',
                    timeout: 5000
                });

                if (response.ok) {
                    const data = await response.json();
                    updateBackendStatus(true, `✅ 后端服务正常！响应状态: ${response.status}`);
                    showResult({
                        message: '后端服务连接成功',
                        url: `${API_BASE}/api/ecommerce/products`,
                        response: data
                    });
                } else {
                    updateBackendStatus(false, `❌ 后端返回错误: ${response.status}`);
                }
            } catch (error) {
                updateBackendStatus(false, `❌ 无法连接到后端服务 (${API_BASE})\n\n可能原因:\n1. Flask 服务未启动\n2. 端口不是 5000\n3. 防火墙阻止\n\n请运行: python run.py`);
                showResult({
                    error: '连接失败',
                    message: error.message,
                    solution: '请在终端运行: python run.py'
                }, true);
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showLoginStatus('请输入用户名和密码', false);
                return;
            }

            showLoginStatus('正在登录...', false);
            showResult('正在发送登录请求...');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();
                
                if (data.success && data.data && data.data.token) {
                    currentToken = data.data.token;
                    sessionStorage.setItem('auth.token', currentToken);
                    showLoginStatus('✅ 登录成功！', true);
                    enableButtons();
                    showResult({
                        message: '登录成功',
                        token: currentToken.substring(0, 50) + '...',
                        user: data.data.user
                    });
                } else {
                    showLoginStatus(`❌ 登录失败: ${data.message || '未知错误'}`, false);
                    showResult({ error: '登录失败', response: data }, true);
                }
            } catch (error) {
                showLoginStatus(`❌ 网络错误: ${error.message}`, false);
                showResult({ error: '网络错误', message: error.message }, true);
            }
        }

        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showLoginStatus('请输入用户名和密码', false);
                return;
            }

            showLoginStatus('正在注册...', false);
            showResult('正在发送注册请求...');

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        email: `${username}@test.com`
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    showLoginStatus('✅ 注册成功！现在可以登录了', true);
                    showResult({ message: '注册成功', data: data });
                } else {
                    showLoginStatus(`❌ 注册失败: ${data.message || '未知错误'}`, false);
                    showResult({ error: '注册失败', response: data }, true);
                }
            } catch (error) {
                showLoginStatus(`❌ 网络错误: ${error.message}`, false);
                showResult({ error: '网络错误', message: error.message }, true);
            }
        }

        async function testProducts() {
            showResult('正在获取商品列表...');

            try {
                const response = await fetch(`${API_BASE}/api/ecommerce/products?page=1&per_page=10`);
                const data = await response.json();
                
                showResult({
                    status: response.status,
                    success: response.ok,
                    message: data.message,
                    products_count: data.data?.total || 0,
                    data: data.data
                });
            } catch (error) {
                showResult({ error: '请求失败', message: error.message }, true);
            }
        }

        async function testOrders() {
            if (!currentToken) {
                showResult({ error: '请先登录' }, true);
                return;
            }

            showResult('正在获取订单列表...');

            try {
                const response = await fetch(`${API_BASE}/api/ecommerce/orders`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                showResult({
                    status: response.status,
                    success: response.ok,
                    message: data.message,
                    orders_count: data.data?.total || 0,
                    data: data.data
                });
            } catch (error) {
                showResult({ error: '请求失败', message: error.message }, true);
            }
        }

        async function createTestProduct() {
            if (!currentToken) {
                showResult({ error: '请先登录' }, true);
                return;
            }

            showResult('正在创建测试商品...');

            try {
                const response = await fetch(`${API_BASE}/api/ecommerce/products`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: '测试商品-' + Date.now(),
                        price: 99.99,
                        description: '这是一个测试商品',
                        stock: 100,
                        category: '测试分类'
                    })
                });

                const data = await response.json();
                
                showResult({
                    status: response.status,
                    success: response.ok,
                    message: data.message,
                    product: data.data
                });
            } catch (error) {
                showResult({ error: '创建失败', message: error.message }, true);
            }
        }

        async function createTestOrder() {
            if (!currentToken) {
                showResult({ error: '请先登录' }, true);
                return;
            }

            showResult('⚠️ 创建订单需要先有商品和购物车...\n\n建议操作流程:\n1. 先创建商品\n2. 添加商品到购物车\n3. 从购物车创建订单\n\n或者直接在数据库中插入测试数据。');
        }
    </script>
</body>
</html>
